name: CI Pipeline

on:
  push:
    branches: [ "main", "epic/*" ]
  pull_request:
    branches: [ "main", "epic/*" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run Build
      run: npm run build --if-present

    - name: Run Tests
      # Assuming there's a test script. If it fails due to missing tests, it means test coverage is required!
      run: npm test --if-present

    - name: Run Linter (Clean Code Check)
      run: npm run lint --if-present
